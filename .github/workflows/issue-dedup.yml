name: Issue dedup
on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        type: number
        description: Issue number to check
        required: true
permissions:
  copilot-requests: write
  issues: write
concurrency:
  group: issue-dedup-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true
jobs:
  dedup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_issue: ${{ inputs.issue_number || github.event.issue.number }}
          labels: auto
          state: all
          label_as_duplicate: true
